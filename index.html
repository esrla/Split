<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Split</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Split</h1>
  <p class="muted">Serverløs utgiftsdeling med GitHub som lagring.</p>

  <section class="card">
    <h2>Oppsett</h2>

    <label>
      GitHub-repo for lagring
      <input id="repoUrl" value="https://github.com/esrla/Frankrike2026">
    </label>

    <label>
      Branch
      <input id="branch" value="main">
    </label>

    <label>
      GitHub-token
      <input id="token" type="password" placeholder="github_pat_...">
    </label>

    <div class="row">
      <button id="saveSettings">Lagre oppsett</button>
      <button id="loadLedger">Last data</button>
    </div>

    <p class="small muted">
      Token lagres kun lokalt i nettleseren på denne mobilen.
    </p>
  </section>

  <section class="card">
    <h2>Husholdninger</h2>

    <label>
      Navn
      <input id="householdName" placeholder="">
    </label>

    <button id="addHousehold">Legg til husholdning</button>

    <ul id="households"></ul>
  </section>

  <section class="card">
    <h2>Ny utgift</h2>

    <label>
      Betalt av
      <select id="paidBy"></select>
    </label>

    <label>
      Beløp (NOK)
      <input id="amount" type="number" inputmode="decimal" placeholder="">
    </label>

    <label>
      Beskrivelse
      <input id="description" placeholder="">
    </label>

    <button id="addExpense">Legg til utgift</button>

    <p class="small muted">
      Alle utgifter deles automatisk mellom alle husholdninger etter vektingen under.
    </p>
  </section>

  <section class="card">
    <h2>Status</h2>
    <div id="weights" class="small"></div>
    <div id="balances" class="small"></div>
  </section>

  <p id="status" class="muted"></p>

  <script src="app.js"></script>
</body>
</html>
