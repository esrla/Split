<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Split</title>
  <style>
    :root { color-scheme: light dark; }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 760px;
      margin: 0 auto;
      padding: 16px;
      line-height: 1.4;
    }

    h1, h2 { margin-bottom: 8px; }

    label {
      display: block;
      margin-top: 12px;
      font-weight: 600;
    }

    input, textarea, button, select {
      width: 100%;
      box-sizing: border-box;
      font: inherit;
      padding: 12px;
      margin-top: 6px;
      border-radius: 10px;
      border: 1px solid #9996;
    }

    button {
      font-weight: 700;
      cursor: pointer;
      margin-top: 12px;
    }

    textarea {
      min-height: 180px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 13px;
      white-space: pre;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .card {
      border: 1px solid #9995;
      border-radius: 14px;
      padding: 14px;
      margin: 14px 0;
    }

    .muted { color: #777; }
    .ok { color: #188038; }
    .error { color: #d93025; }
    .small { font-size: 14px; }

    ul { padding-left: 20px; }
    code { font-size: 0.95em; }
  </style>
</head>
<body>
  <h1>Split</h1>
  <p class="muted">Serverløs utgiftsdeling med GitHub som lagring.</p>

  <section class="card">
    <h2>Oppsett</h2>

    <label>
      GitHub-repo for lagring
      <input id="repoUrl" value="https://github.com/esrla/Split">
    </label>

    <div class="row">
      <label>
        Branch
        <input id="branch" value="main">
      </label>

      <label>
        Datafil
        <input id="path" value="data/ledger.jsonl">
      </label>
    </div>

    <label>
      GitHub-token
      <input id="token" type="password" placeholder="github_pat_...">
    </label>

    <div class="row">
      <button id="saveSettings">Lagre oppsett</button>
      <button id="loadLedger">Last data</button>
    </div>

    <p class="small muted">
      Token lagres kun lokalt i nettleseren på denne mobilen.
    </p>
  </section>

  <section class="card">
    <h2>Personer</h2>

    <label>
      Navn
      <input id="personName" placeholder="Eskil">
    </label>

    <button id="addPerson">Legg til person</button>

    <ul id="people"></ul>
  </section>

  <section class="card">
    <h2>Ny utgift</h2>

    <label>
      Betalt av
      <select id="paidBy"></select>
    </label>

    <label>
      Beløp
      <input id="amount" type="number" inputmode="decimal" placeholder="420">
    </label>

    <label>
      Beskrivelse
      <input id="description" placeholder="Middag">
    </label>

    <label>
      Delt mellom
      <select id="participants" multiple></select>
    </label>

    <button id="addExpense">Legg til utgift</button>

    <p class="small muted">
      Tips: På mobil kan flervalg være litt kronglete. Hvis ingen er valgt, deles utgiften mellom alle.
    </p>
  </section>

  <section class="card">
    <h2>Status</h2>
    <div id="balances" class="small"></div>
  </section>

  <section class="card">
    <h2>Rådata</h2>
    <textarea id="ledger" spellcheck="false"></textarea>
    <button id="saveLedger">Lagre rådata manuelt</button>
  </section>

  <p id="status" class="muted"></p>

  <script>
    const $ = id => document.getElementById(id);

    const els = {
      repoUrl: $("repoUrl"),
      branch: $("branch"),
      path: $("path"),
      token: $("token"),
      saveSettings: $("saveSettings"),
      loadLedger: $("loadLedger"),
      personName: $("personName"),
      addPerson: $("addPerson"),
      people: $("people"),
      paidBy: $("paidBy"),
      amount: $("amount"),
      description: $("description"),
      participants: $("participants"),
      addExpense: $("addExpense"),
      balances: $("balances"),
      ledger: $("ledger"),
      saveLedger: $("saveLedger"),
      status: $("status")
    };

    let fileSha = null;

    loadSettings();
    render();

    function setStatus(message, type = "muted") {
      els.status.className = type;
      els.status.textContent = message;
    }

    function parseRepoUrl(value) {
      const cleaned = value.trim().replace(/\/$/, "");
      const match =
        cleaned.match(/^https:\/\/github\.com\/([^/]+)\/([^/]+)$/) ||
        cleaned.match(/^([^/]+)\/([^/]+)$/);

      if (!match) throw new Error("Repo må være på formatet https://github.com/eier/repo eller eier/repo");
      return { owner: match[1], repo: match[2] };
    }

    function getConfig() {
      return {
        ...parseRepoUrl(els.repoUrl.value),
        branch: els.branch.value.trim() || "main",
        path: els.path.value.trim() || "data/ledger.jsonl",
        token: els.token.value.trim()
      };
    }

    function apiUrl(includeRef = true) {
      const config = getConfig();
      const base = `https://api.github.com/repos/${config.owner}/${config.repo}/contents/${config.path}`;
      return includeRef ? `${base}?ref=${encodeURIComponent(config.branch)}` : base;
    }

    function headers() {
      return {
        Authorization: `Bearer ${getConfig().token}`,
        Accept: "application/vnd.github+json",
        "X-GitHub-Api-Version": "2022-11-28"
      };
    }

    function loadSettings() {
      els.repoUrl.value = localStorage.getItem("split.repoUrl") || els.repoUrl.value;
      els.branch.value = localStorage.getItem("split.branch") || els.branch.value;
      els.path.value = localStorage.getItem("split.path") || els.path.value;
      els.token.value = localStorage.getItem("split.token") || "";
    }

    function saveSettings() {
      localStorage.setItem("split.repoUrl", els.repoUrl.value.trim());
      localStorage.setItem("split.branch", els.branch.value.trim());
      localStorage.setItem("split.path", els.path.value.trim());
      localStorage.setItem("split.token", els.token.value.trim());
      setStatus("Oppsett lagret lokalt på denne mobilen.", "ok");
    }

    function decodeBase64(value) {
      return new TextDecoder().decode(
        Uint8Array.from(atob(value.replace(/\n/g, "")), char => char.charCodeAt(0))
      );
    }

    function encodeBase64(value) {
      let binary = "";
      new TextEncoder().encode(value).forEach(byte => binary += String.fromCharCode(byte));
      return btoa(binary);
    }

    function initialLedger() {
      return `${JSON.stringify({
        id: "init",
        type: "trip.created",
        name: "Split",
        currency: "NOK",
        createdAt: new Date().toISOString()
      })}\n`;
    }

    async function loadLedger() {
      const res = await fetch(apiUrl(), { headers: headers() });

      if (res.status === 404) {
        fileSha = null;
        els.ledger.value = initialLedger();
        await saveLedger("Initialize ledger");
        setStatus("Datafil opprettet.", "ok");
        return;
      }

      if (!res.ok) throw new Error(await res.text());

      const file = await res.json();
      fileSha = file.sha;
      els.ledger.value = decodeBase64(file.content);
      render();
      setStatus("Data lastet.", "ok");
    }

    async function saveLedger(message = "Update ledger") {
      const body = {
        message,
        content: encodeBase64(normalizedLedger()),
        branch: getConfig().branch
      };

      if (fileSha) body.sha = fileSha;

      const res = await fetch(apiUrl(false), {
        method: "PUT",
        headers: { ...headers(), "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });

      if (!res.ok) throw new Error(await res.text());

      const result = await res.json();
      fileSha = result.content.sha;
      els.ledger.value = normalizedLedger();
      render();
      setStatus("Data lagret.", "ok");
    }

    async function appendEvent(event, message) {
      await loadLedger();

      if (readEvents().some(existing => existing.id === event.id)) return;

      els.ledger.value = `${normalizedLedger()}${JSON.stringify(event)}\n`;

      try {
        await saveLedger(message);
      } catch (err) {
        if (!String(err.message).includes("sha")) throw err;
        await loadLedger();
        els.ledger.value = `${normalizedLedger()}${JSON.stringify(event)}\n`;
        await saveLedger(message);
      }
    }

    function normalizedLedger() {
      const value = els.ledger.value.trim();
      return value ? `${value}\n` : "";
    }

    function readEvents() {
      const value = normalizedLedger().trim();
      return value ? value.split("\n").map(line => JSON.parse(line)) : [];
    }

    function peopleFromEvents(events) {
      const people = new Map();

      for (const event of events) {
        if (event.type === "person.added") people.set(event.personId, event.name);

        if (event.type === "expense.added") {
          people.set(event.paidBy, event.paidBy);
          Object.keys(event.shares || {}).forEach(personId => people.set(personId, personId));
        }
      }

      return [...people].map(([id, name]) => ({ id, name }));
    }

    function calculateBalances(events) {
      const balances = new Map();

      for (const event of events) {
        if (event.type !== "expense.added") continue;

        const shares = event.shares || {};
        const totalShares = Object.values(shares).reduce((sum, share) => sum + Number(share), 0);
        if (!totalShares) continue;

        balances.set(event.paidBy, (balances.get(event.paidBy) || 0) + Number(event.amount));

        for (const [personId, share] of Object.entries(shares)) {
          balances.set(
            personId,
            (balances.get(personId) || 0) - Number(event.amount) * Number(share) / totalShares
          );
        }
      }

      return [...balances].sort((a, b) => b[1] - a[1]);
    }

    function render() {
      let events = [];

      try {
        events = readEvents();
      } catch {
        els.balances.innerHTML = "<p class='error'>Rådata inneholder ugyldig JSONL.</p>";
        return;
      }

      const people = peopleFromEvents(events);

      els.people.innerHTML = people.length
        ? people.map(person => `<li>${escapeHtml(person.name)} <span class="muted">(${escapeHtml(person.id)})</span></li>`).join("")
        : "<li class='muted'>Ingen personer ennå.</li>";

      els.paidBy.innerHTML = people
        .map(person => `<option value="${escapeHtml(person.id)}">${escapeHtml(person.name)}</option>`)
        .join("");

      els.participants.innerHTML = people
        .map(person => `<option value="${escapeHtml(person.id)}" selected>${escapeHtml(person.name)}</option>`)
        .join("");

      const balances = calculateBalances(events);

      els.balances.innerHTML = balances.length
        ? `<ul>${balances.map(([personId, amount]) => `<li><b>${escapeHtml(displayName(people, personId))}</b>: ${formatMoney(amount)}</li>`).join("")}</ul>`
        : "<p class='muted'>Ingen utgifter ennå.</p>";
    }

    function displayName(people, personId) {
      return people.find(person => person.id === personId)?.name || personId;
    }

    function formatMoney(value) {
      return `${value.toFixed(2)} NOK`;
    }

    function slug(value) {
      return value
        .trim()
        .toLowerCase()
        .replaceAll("æ", "ae")
        .replaceAll("ø", "o")
        .replaceAll("å", "a")
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-|-$/g, "");
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }

    els.saveSettings.onclick = saveSettings;

    els.loadLedger.onclick = async () => {
      try {
        saveSettings();
        await loadLedger();
      } catch (err) {
        setStatus(`Feil ved lasting: ${err.message}`, "error");
      }
    };

    els.saveLedger.onclick = async () => {
      try {
        await saveLedger("Manual ledger update");
      } catch (err) {
        setStatus(`Feil ved lagring: ${err.message}`, "error");
      }
    };

    els.addPerson.onclick = async () => {
      try {
        const name = els.personName.value.trim();
        if (!name) throw new Error("Navn mangler.");

        await appendEvent({
          id: crypto.randomUUID(),
          type: "person.added",
          personId: slug(name),
          name,
          createdAt: new Date().toISOString()
        }, `Add person: ${name}`);

        els.personName.value = "";
      } catch (err) {
        setStatus(`Feil ved person: ${err.message}`, "error");
      }
    };

    els.addExpense.onclick = async () => {
      try {
        const paidBy = els.paidBy.value;
        const amount = Number(els.amount.value);
        const description = els.description.value.trim();

        if (!paidBy) throw new Error("Velg hvem som betalte.");
        if (!amount) throw new Error("Beløp mangler.");
        if (!description) throw new Error("Beskrivelse mangler.");

        const selected = [...els.participants.selectedOptions].map(option => option.value);
        const people = peopleFromEvents(readEvents());
        const participants = selected.length ? selected : people.map(person => person.id);

        await appendEvent({
          id: crypto.randomUUID(),
          type: "expense.added",
          paidBy,
          amount,
          currency: "NOK",
          description,
          shares: Object.fromEntries(participants.map(personId => [personId, 1])),
          createdAt: new Date().toISOString()
        }, `Add expense: ${description}`);

        els.amount.value = "";
        els.description.value = "";
      } catch (err) {
        setStatus(`Feil ved utgift: ${err.message}`, "error");
      }
    };

    els.ledger.oninput = render;
  </script>
</body>
</html>
